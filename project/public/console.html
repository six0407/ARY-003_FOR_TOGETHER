<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race Console — ARY</title>
  <link rel="stylesheet" href="./app.css" />
  <style>
    /* ====== Console Layout ====== */
    .console-shell { position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg-gradient); }
    .console-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 32px;
      background:rgba(255, 255, 255, 0.75);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--line);
      z-index:10;
    }
    .console-header .brand {
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
      font-family:'Outfit',sans-serif;
      font-weight:800;
      color:var(--ink);
    }
    .console-header .brand img { height:32px; transition: transform 0.3s; }
    .console-header .brand:hover img { transform: rotate(-8deg) scale(1.05); }
    .console-header .brand strong { font-size:18px; letter-spacing: -0.3px; }
    .console-header .brand small { font-size:11px;color:var(--muted);margin-left:4px;font-weight:600; }
    .console-user { display:flex;align-items:center;gap:12px; }
    .console-user .role-badge { display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:800;background:rgba(234,243,255,0.8);color:var(--primary); }
    .console-user .user-name { font-size:14px;font-weight:700;color:var(--ink); }
    .console-user button { 
      min-height:32px;
      padding:0 16px;
      border:1px solid var(--line);
      border-radius:var(--radius-sm);
      background:var(--glass-bg);
      color:var(--primary);
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      transition:var(--transition);
    }
    .console-user button:hover {
      background: hsla(var(--h-primary), 90%, 56%, 0.05);
      border-color: hsla(var(--h-primary), 50%, 50%, 0.25);
    }
    .console-user button.primary {
      color:#fff;
      background:linear-gradient(135deg,var(--primary),hsl(var(--h-primary), 85%, 50%));
      border:none;
      box-shadow: 0 4px 12px -3px var(--primary);
    }
    .console-user button.primary:hover {
      transform:translateY(-1px);
      box-shadow: 0 6px 16px -2px var(--primary);
    }

    .console-body { display:flex;flex:1;overflow:hidden; }
    .console-sidebar {
      width:240px;
      background:rgba(255, 255, 255, 0.45);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border-right:1px solid var(--line);
      padding:24px 12px;
      overflow-y:auto;
      flex-shrink:0;
    }
    .console-sidebar .sidebar-section { margin-bottom:24px; }
    .console-sidebar .sidebar-section h4 {
      font-family:'Outfit',sans-serif;
      font-size:11px;
      font-weight:800;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:10px;
      padding:0 12px;
    }
    .console-sidebar .sidebar-item {
      display:block;
      width:100%;
      padding:10px 16px;
      border:none;
      border-radius:var(--radius-md);
      background:transparent;
      color:var(--ink);
      font-size:13.5px;
      font-weight:600;
      cursor:pointer;
      text-align:left;
      margin-bottom:4px;
      transition:var(--transition);
    }
    .console-sidebar .sidebar-item:hover { background:rgba(0,0,0,0.03); }
    .console-sidebar .sidebar-item.active {
      background:hsla(var(--h-primary), 90%, 56%, 0.08);
      color:var(--primary);
      box-shadow: 0 2px 8px -2px var(--primary-glow);
    }
    .console-sidebar .sidebar-item .badge {
      float:right;
      padding:2px 8px;
      border-radius:10px;
      font-size:11px;
      background:hsla(var(--h-primary), 90%, 56%, 0.1);
      color:var(--primary);
      font-weight:800;
    }
    .console-sidebar .race-label { font-size:12px;color:var(--muted);padding:4px 16px 8px;font-weight:700; }
    .console-sidebar .back-link {
      display:block;
      padding:12px 16px;
      margin-top:16px;
      border-top:1px solid var(--line);
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      transition:var(--transition);
    }
    .console-sidebar .back-link:hover { color:var(--primary); }

    .console-main { flex:1;padding:32px 40px;overflow-y:auto; }

    /* ====== Console Home ====== */
    .console-home h1 {
      font-family:'Outfit',sans-serif;
      font-size:32px;
      font-weight:900;
      color:var(--ink);
      margin-bottom:6px;
      letter-spacing:-0.5px;
    }
    .console-home .subtitle { color:var(--muted);font-size:15px;margin-bottom:32px;font-weight:500; }
    .console-section { margin-bottom:36px; }
    .console-section h2 {
      font-family:'Outfit',sans-serif;
      font-size:20px;
      font-weight:800;
      color:var(--ink);
      margin-bottom:16px;
      display:flex;
      align-items:center;
      gap:10px;
      letter-spacing:-0.2px;
    }
    .console-section h2 .section-count { font-size:14px;color:var(--muted);font-weight:600;margin-left:4px; }
    .console-card-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px; }
    
    .console-card {
      padding:24px;
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      background:rgba(255,255,255,0.7);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:0 8px 30px rgba(0,0,0,0.02);
      cursor:pointer;
      transition:var(--transition);
    }
    .console-card:hover {
      transform:translateY(-4px);
      box-shadow: 0 16px 40px -10px hsla(var(--h-primary), 60%, 20%, 0.1);
      border-color: hsla(var(--h-primary), 50%, 50%, 0.2);
    }
    .console-card h3 {
      font-family:'Outfit',sans-serif;
      font-size:19px;
      font-weight:800;
      color:var(--ink);
      margin-bottom:8px;
    }
    .console-card p { font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:16px;font-weight:500; }
    .console-card .card-meta { display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px; }
    .console-card .card-meta span { font-size:13px;color:var(--primary);font-weight:700; }
    .console-card .card-actions { display:flex;gap:8px; }
    .console-card .card-actions button {
      min-height:34px;
      padding:0 16px;
      border:1px solid var(--line);
      border-radius:var(--radius-sm);
      background:var(--glass-bg);
      color:var(--primary);
      font-size:12.5px;
      font-weight:700;
      cursor:pointer;
      transition:var(--transition);
    }
    .console-card .card-actions button:hover {
      background:hsla(var(--h-primary), 90%, 56%, 0.05);
      border-color:hsla(var(--h-primary), 50%, 50%, 0.25);
    }
    .console-card .card-actions button.primary {
      color:#fff;
      background:linear-gradient(135deg,var(--primary),hsl(var(--h-primary), 85%, 50%));
      border:none;
      box-shadow:0 4px 12px -3px var(--primary);
    }
    .console-card .card-actions button.primary:hover {
      box-shadow:0 6px 16px -2px var(--primary);
      transform:translateY(-1px);
    }

    /* ====== Workspace ====== */
    .workspace-top { margin-bottom:28px; }
    .workspace-top .breadcrumb { font-size:13px;color:var(--muted);font-weight:700;margin-bottom:6px; }
    .workspace-top .breadcrumb a { color:var(--primary);cursor:pointer;text-decoration:none;transition:var(--transition); }
    .workspace-top .breadcrumb a:hover { color:var(--primary-hover); }
    .workspace-top h1 {
      font-family:'Outfit',sans-serif;
      font-size:28px;
      font-weight:900;
      color:var(--ink);
      margin-bottom:8px;
      letter-spacing:-0.5px;
    }
    .workspace-top .race-status-line { display:flex;gap:12px;align-items:center;margin-bottom:12px; }
    .workspace-panels { display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px; }

    .info-card {
      padding:24px;
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      background:#fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }
    .info-card h4 {
      font-family:'Outfit',sans-serif;
      font-size:13.5px;
      font-weight:800;
      color:var(--primary);
      margin-bottom:16px;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }
    .info-card .info-row { display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;font-size:14px;border-bottom:1px solid rgba(0,0,0,0.04);gap:16px; }
    .info-card .info-row:last-child { border-bottom:none; }
    .info-card .info-row .label { color:var(--muted);font-weight:600;flex-shrink:0; }
    .info-card .info-row .value { font-weight:700;color:var(--ink);text-align:right;word-break:break-word; }

    .status-tag { display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:800;text-transform:uppercase; }
    .status-tag.running { background:hsl(217, 90%, 93%);color:hsl(217, 85%, 28%); }
    .status-tag.registration { background:hsl(142, 70%, 93%);color:hsl(142, 75%, 25%); }
    .status-tag.completed { background:hsl(215, 20%, 93%);color:hsl(215, 15%, 35%); }
    .status-tag.judging { background:hsl(38, 92%, 92%);color:hsl(38, 90%, 25%); }
    .status-tag.submitted { background:hsl(217, 90%, 93%);color:hsl(217, 85%, 28%); }
    .status-tag.approved { background:hsl(142, 70%, 93%);color:hsl(142, 75%, 25%); }
    .status-tag.rejected { background:hsl(0, 93%, 94%);color:hsl(0, 80%, 30%); }
    .status-tag.draft { background:hsl(215, 15%, 90%);color:hsl(215, 15%, 45%); }

    /* ====== Select & Button Styling ====== */
    select {
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--glass-bg);
      color: var(--ink);
      font-weight: 600;
      font-size: 13px;
      outline: none;
      transition: var(--transition);
      cursor: pointer;
    }
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    button.primary {
      color: #fff !important;
      background: linear-gradient(135deg, var(--primary), hsl(var(--h-primary), 85%, 50%)) !important;
      border: none !important;
      box-shadow: 0 4px 12px -3px var(--primary) !important;
      font-weight: 700;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    button.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px -2px var(--primary) !important;
    }

    /* ====== Workspace Tabs ====== */
    .tab-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0;
    }
    .tab-item {
      padding: 12px 16px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 14.5px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .tab-item:hover {
      color: var(--ink);
    }
    .tab-item.active {
      color: var(--primary);
      font-weight: 800;
    }
    .tab-item.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 2px;
    }

    /* ====== Login overlay ====== */
    .login-overlay { position:fixed;inset:0;background:rgba(15,23,42,0.4);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center; }
    .login-modal {
      background:#fff;
      border-radius:24px;
      padding:36px 44px;
      max-width:460px;
      width:90%;
      box-shadow:0 30px 70px rgba(0,0,0,0.15);
      border:1px solid rgba(255,255,255,0.8);
    }
    .login-modal h2 {
      font-family:'Outfit',sans-serif;
      font-size:28px;
      font-weight:900;
      color:var(--ink);
      text-align:center;
      margin-bottom:6px;
      letter-spacing:-0.5px;
    }
    .login-modal .sub { text-align:center;color:var(--muted);font-size:14.5px;margin-bottom:24px;font-weight:500; }
    
    .login-user-option {
      display:flex;
      flex-direction:column;
      width:100%;
      padding:16px 20px;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(0,0,0,0.01);
      margin-bottom:10px;
      cursor:pointer;
      text-align:left;
      transition:var(--transition);
    }
    .login-user-option:hover {
      border-color:hsla(var(--h-primary), 60%, 50%, 0.3);
      background:hsla(var(--h-primary), 90%, 56%, 0.03);
      transform:translateY(-1px);
    }
    .login-user-option b { display:block;font-size:16px;color:var(--ink);font-weight:700; }
    .login-user-option span { font-size:12px;color:var(--primary);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:0.5px; }
    .login-user-option small { display:block;font-size:12px;color:var(--muted);margin-top:4px;font-weight:500;line-height:1.4; }

    /* ====== Empty state ====== */
    .empty-state { text-align:center;padding:48px 24px;color:var(--muted);font-size:15px;line-height:1.6; }
    .empty-state button {
      margin-top:16px;
      min-height:36px;
      padding:0 20px;
      border:1px solid var(--line);
      border-radius:var(--radius-md);
      background:var(--glass-bg);
      color:var(--primary);
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      transition:var(--transition);
    }
    .empty-state button:hover {
      background:hsla(var(--h-primary), 90%, 56%, 0.04);
      border-color:hsla(var(--h-primary), 50%, 50%, 0.2);
    }
    .empty-state button.primary {
      color:#fff;
      background:linear-gradient(135deg,var(--primary),hsl(var(--h-primary), 85%, 50%));
      border:none;
      box-shadow: 0 6px 16px -4px var(--primary);
    }
    .empty-state button.primary:hover {
      box-shadow: 0 8px 20px -3px var(--primary);
      transform:translateY(-1px);
    }

    /* ====== Constraint Checks ====== */
    .constraint-checks { margin-top:16px;padding:16px;border-radius:12px;background:rgba(0,0,0,0.02);border:1px solid var(--line); }
    .constraint-checks h4 { font-family:'Outfit',sans-serif;font-size:12px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px; }
    .constraint-row { display:grid;grid-template-columns:22px 1fr;gap:6px;align-items:start;padding:4px 0;font-size:13.5px; }
    .constraint-row span { font-weight:800;font-size:13.5px; }
    .constraint-row.pass span { color:hsl(142, 70%, 40%); }
    .constraint-row.fail span { color:hsl(0, 80%, 50%); }
    .constraint-row small { display:block;margin-top:1px;color:var(--muted);font-size:11.5px;font-weight:500; }
    .review-flags { margin-top:12px;padding:10px 14px;border-radius:8px;background:hsl(38, 92%, 92%);color:hsl(38, 90%, 25%);font-size:12.5px;font-weight:700;border:1px solid hsl(38, 80%, 80%); }

    /* ====== Forms & Actions ====== */
    .action-bar { display:flex;flex-wrap:wrap;gap:10px;margin-top:20px; }
    .action-bar button {
      min-height:36px;
      padding:0 20px;
      border:1px solid var(--line);
      border-radius:var(--radius-md);
      background:var(--glass-bg);
      color:var(--primary);
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      transition:var(--transition);
    }
    .action-bar button:hover {
      background:hsla(var(--h-primary), 90%, 56%, 0.04);
      border-color:hsla(var(--h-primary), 50%, 50%, 0.2);
      transform:translateY(-1px);
    }
    .action-bar button.primary {
      color:#fff;
      background:linear-gradient(135deg,var(--primary),hsl(var(--h-primary), 85%, 50%));
      border:none;
      box-shadow: 0 6px 16px -4px var(--primary);
    }
    .action-bar button.primary:hover {
      box-shadow: 0 8px 20px -3px var(--primary);
    }
    .action-bar button.danger {
      color:#fff;
      background:linear-gradient(135deg,hsl(0, 75%, 50%),hsl(0, 85%, 45%));
      border:none;
      box-shadow: 0 6px 16px -4px hsl(0, 75%, 50%);
    }
    .action-bar button.danger:hover {
      box-shadow: 0 8px 20px -3px hsl(0, 75%, 50%);
    }

    .form-group { margin-bottom:16px; }
    .form-group label { display:block;font-size:12px;font-weight:800;color:var(--primary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px; }
    .form-group input,.form-group textarea,.form-group select {
      width:100%;
      padding:10px 14px;
      border:1px solid var(--line);
      border-radius:var(--radius-md);
      font-size:14px;
      background:#fff;
      color:var(--ink);
      outline:none;
      transition:var(--transition);
    }
    .form-group textarea { min-height:80px;resize:vertical; }
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus {
      border-color:var(--primary);
      box-shadow:0 0 0 3px var(--primary-glow);
    }

    .feedback { margin-top:12px;padding:12px 16px;border-radius:12px;font-size:13.5px;line-height:1.5;font-weight:600; }
    .feedback.ok { background:hsl(142, 70%, 93%);color:hsl(142, 75%, 25%);border:1px solid hsl(142, 60%, 80%); }
    .feedback.error { background:hsl(0, 93%, 94%);color:hsl(0, 80%, 30%);border:1px solid hsl(0, 80%, 80%); }
    .feedback.info { background:hsl(217, 90%, 93%);color:hsl(217, 85%, 28%);border:1px solid hsl(217, 70%, 80%); }

    /* ====== CA Cards ====== */
    .ca-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:12px; }
    .ca-card {
      padding:16px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.7);
      font-size:13px;
      transition:var(--transition);
    }
    .ca-card:hover {
      border-color: hsla(var(--h-primary), 40%, 50%, 0.2);
      background: #fff;
    }
    .ca-card b { display:block;color:var(--ink);font-size:14.5px;margin-bottom:4px;font-weight:700; }
    .ca-card span { display:block;color:var(--muted);font-size:11.5px;line-height:1.5;font-weight:500; }
    .ca-card.verified { border-left:4px solid hsl(142, 70%, 45%); }
    .ca-card.failed { border-left:4px solid hsl(0, 80%, 50%);background:hsl(0, 90%, 99%); }
    .ca-card .ca-status { display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:800;margin-top:8px;text-transform:uppercase; }
    .ca-card .ca-status.ok { background:hsl(142, 70%, 93%);color:hsl(142, 75%, 25%); }
    .ca-card .ca-status.err { background:hsl(0, 93%, 94%);color:hsl(0, 80%, 30%); }

    /* ====== Responsive ====== */
    @media (max-width:768px) {
      .console-sidebar { width:180px; }
      .console-main { padding:24px 20px; }
      .console-card-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div class="console-shell">
  <header class="console-header">
    <a class="brand" href="/console">
      <img src="./assets/logo-horse-compass-transparent.png" alt="" />
      <span><strong>ARY</strong><small> Race Console</small></span>
    </a>
    <div class="console-user" id="console-user-area">
      <span style="color:var(--muted);font-size:13px;">未登录</span>
      <button onclick="showLogin()">登录</button>
    </div>
  </header>

  <div class="console-body">
    <!-- Sidebar -->
    <aside class="console-sidebar" id="console-sidebar">
      <div class="sidebar-section">
        <button class="sidebar-item active" onclick="navigate('home')">🏠 Console Home</button>
      </div>
      <div class="sidebar-section" id="sidebar-races" style="display:none;">
        <h4>我的赛事</h4>
        <div id="sidebar-race-list"></div>
      </div>
      <div class="sidebar-section" id="sidebar-admin" style="display:none;">
        <h4>管理</h4>
        <button class="sidebar-item" onclick="window.location.href='/admin'">🔧 Admin Console</button>
      </div>
      <a class="back-link" href="/">← 返回公开端</a>
    </aside>

    <!-- Main Content -->
    <main class="console-main" id="console-main">
      <!-- Console Home -->
      <div class="console-home" id="view-home">
        <h1>赛事控制台</h1>
        <p class="subtitle">管理你的赛事、参赛和评审工作</p>
        <div id="console-home-content"><div class="empty-state">请先登录</div></div>
      </div>

      <!-- Workspace (Organizer / Rider / Judge) -->
      <div id="view-workspace" style="display:none;">
        <div class="workspace-top" id="workspace-top"></div>
        <!-- Workspace Tab Bar -->
        <div class="tab-bar" id="workspace-tabs"></div>
        <div id="workspace-content"></div>
        <div id="workspace-feedback" class="feedback" style="display:none;"></div>
      </div>
    </main>
  </div>
</div>

<!-- Login Overlay -->
<div class="login-overlay" id="login-overlay" style="display:none;" onclick="if(event.target===this)hideLogin()">
  <div class="login-modal" onclick="event.stopPropagation()">
    <h2>🔑 登录</h2>
    <p class="sub">使用 GitHub 账号快速登录</p>
    <button onclick="window.location.href='/api/auth/github'" style="width:100%;padding:12px;border:none;border-radius:12px;background:#24292f;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="white"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      Login with GitHub
    </button>
    <div style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:12px;">— 或使用演示账号 —</div>

      <button onclick="hideLogin()" style="min-height:34px;padding:0 18px;border:1px solid var(--line);border-radius:10px;background:var(--glass);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;">取消</button>
    </div>

<script>
// Wrap fetch to automatically append Authorization header from session storage
const originalFetch = window.fetch;
window.fetch = function(url, options = {}) {
  const userId = sessionStorage.getItem('ary_console_user');
  if (userId) {
    options.headers = options.headers || {};
    if (!options.headers['Authorization']) {
      options.headers['Authorization'] = `Bearer demo-token-${userId}`;
    }
  }
  return originalFetch(url, options);
};

async function safeJson(res, defaultValue = []) {
  if (!res.ok) return defaultValue;
  try {
    const body = await res.json();
    if (!body) return defaultValue;
    // Handle unified response format { success: true, data: ... }
    if (body.success !== undefined) {
      return body.success ? (body.data ?? defaultValue) : defaultValue;
    }
    if (body.error) return defaultValue;
    return body;
  } catch(e) {
    return defaultValue;
  }
}

function fmtDate(d) {
  if (!d) return '-';
  const date = new Date(d);
  if (isNaN(date.getTime())) return d;
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  const h = String(date.getHours()).padStart(2, '0');
  const min = String(date.getMinutes()).padStart(2, '0');
  return `${y}-${m}-${day} ${h}:${min}`;
}

// ====== App State ======
const App = {
  currentUser: null,
  currentView: 'home',
  currentRace: null,
  users: [],
  races: [],
  registrations: [],
  raceProjects: [],
  works: [],
  caConnections: [],
  judgeAssignments: [],
  judgingRecords: [],
  awards: [],
  wsTab: 'overview',
};

// ====== Init ======
async function init() {
  try {
    // Handle OAuth callback: check for token in URL hash
    if (window.location.hash.startsWith('#token=')) {
      const token = window.location.hash.replace('#token=', '');
      const uid = token.replace('demo-token-', '');
      sessionStorage.setItem('ary_console_user', uid);
      sessionStorage.setItem('ary_token', token); // Sync with auth.js
      history.replaceState(null, '', window.location.pathname); // Clean URL
    }

    const [racesRes, usersRes, regsRes, rpRes, worksRes, jaRes, jrRes, awRes, caRes] = await Promise.all([
      fetch('/api/races'),
      fetch('/api/auth/users'),
      fetch('/api/registrations'),
      fetch('/api/race-projects'),
      fetch('/api/works'),
      fetch('/api/judge-assignments'),
      fetch('/api/judging-records'),
      fetch('/api/awards'),
      fetch('/api/ca-connections'),
    ]);
    App.races = await safeJson(racesRes, []);
    App.users = await safeJson(usersRes, []);
    App.registrations = await safeJson(regsRes, []);
    App.raceProjects = await safeJson(rpRes, []);
    App.works = await safeJson(worksRes, []);
    App.judgeAssignments = await safeJson(jaRes, []);
    App.judgingRecords = await safeJson(jrRes, []);
    App.caConnections = await safeJson(caRes, []);
    App.awards = await safeJson(awRes, []);

    // Check session
    const saved = sessionStorage.getItem('ary_console_user');
    if (saved) {
      const uid = saved;
      App.currentUser = App.users.find(u => u.id === uid);
      if (App.currentUser) {
        renderHeader();
        renderSidebar();
      }
    }
    renderHome();
    renderLoginModal();
  } catch (e) {
    console.error('Init error:', e);
  }
}

// ====== Login ======
function showLogin() {
  document.getElementById('login-overlay').style.display = 'flex';
}
function hideLogin() {
  document.getElementById('login-overlay').style.display = 'none';
}
function doLogin(userId) {
  App.currentUser = App.users.find(u => u.id === userId);
  if (App.currentUser) {
    sessionStorage.setItem('ary_console_user', userId);
    sessionStorage.setItem('ary_token', `demo-token-${userId}`);
    localStorage.setItem('ary_token', `demo-token-${userId}`);
  }
  hideLogin();
  renderHeader(); renderSidebar(); navigate('home');
}
function doLogout() {
  App.currentUser = null;
  sessionStorage.removeItem('ary_console_user');
  sessionStorage.removeItem('ary_token');
  localStorage.removeItem('ary_token');
  sessionStorage.removeItem('ary_user');
  renderHeader(); renderSidebar(); navigate('home');
}
function renderLoginModal() {
  document.getElementById('login-user-list').innerHTML = App.users.map(u => {
    const roleLabels = (u.roles||[]).map(r => ({rider:'🏇选手',judge:'⚖️评委',organizer:'📋主办方',admin:'🔧管理员'}[r]||r)).join(' · ');
    return `<button class="login-user-option" onclick="doLogin('${u.id}')"><b>${u.display_name}</b><span>${roleLabels||'无角色'}</span><small>${u.github_account_id}</small></button>`;
  }).join('');
}

// ====== Header ======
function renderHeader() {
  const area = document.getElementById('console-user-area');
  const u = App.currentUser;
  if (u) {
    const roleLabels = (u.roles||[]).map(r => ({rider:'🏇',judge:'⚖️',organizer:'📋',admin:'🔧'}[r]||r)).join(' ');
    area.innerHTML = `<span class="user-name">${u.display_name}</span><span class="role-badge">${roleLabels}</span><button onclick="doLogout()">退出</button>`;
  } else {
    area.innerHTML = `<span style="color:var(--muted);font-size:13px;">未登录</span><button onclick="showLogin()" class="primary">登录</button>`;
  }
}

// ====== Sidebar ======
function renderSidebar() {
  const u = App.currentUser;
  const raceSection = document.getElementById('sidebar-races');
  const adminSection = document.getElementById('sidebar-admin');
  const raceList = document.getElementById('sidebar-race-list');
  if (!u) { raceSection.style.display='none'; adminSection.style.display='none'; return; }

  const myRaceIds = new Set();
  const isOrg = u.roles.includes('organizer')||u.roles.includes('admin');
  const isRider = u.roles.includes('rider');
  const isJudge = u.roles.includes('judge');
  if (isOrg) App.races.filter(r => (r.organizer_user_ids||[]).includes(u.id)).forEach(r => myRaceIds.add(r.id));
  if (isRider) App.registrations.filter(reg => reg.user_id===u.id).forEach(reg => myRaceIds.add(reg.race_id));
  if (isJudge) App.races.filter(r => r.status==='judging'||r.status==='submitting').forEach(r => myRaceIds.add(r.id));

  if (myRaceIds.size > 0) {
    raceSection.style.display='block';
    raceList.innerHTML = App.races.filter(r => myRaceIds.has(r.id)).map(r =>
      `<button class="sidebar-item" onclick="openWorkspace('${r.id}')">${r.title}<span class="badge">${({running:'进行中',registration:'报名中',judging:'评审中',completed:'已结束',submitting:'提交期'}[r.status]||r.status)}</span></button>`
    ).join('');
  } else { raceSection.style.display='none'; }

  adminSection.style.display = (u.roles.includes('organizer')||u.roles.includes('admin'))?'block':'none';
}

// ====== Navigation ======
function navigate(view) {
  App.currentView = view;
  document.getElementById('view-home').style.display = view==='home'?'block':'none';
  document.getElementById('view-workspace').style.display = view==='workspace'?'block':'none';
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  if (view==='home') document.querySelector('.sidebar-item[onclick*="navigate(\'home\')"]')?.classList.add('active');
  if (view==='home') renderHome();
}

// ====== Home Page ======
function renderHome() {
  const u = App.currentUser;
  const container = document.getElementById('console-home-content');
  if (!u) { container.innerHTML = `<div class="empty-state">请先登录以查看你的赛事控制台<br><button class="primary" onclick="showLogin()">登录</button></div>`; return; }

  const isOrg = u.roles.includes('organizer')||u.roles.includes('admin');
  const isRider = u.roles.includes('rider');
  const isJudge = u.roles.includes('judge');
  let html = '';

  if (isOrg) {
    const myRaces = App.races.filter(r => (r.organizer_user_ids||[]).includes(u.id));
    html += `<div class="console-section"><h2>📋 我主办的赛事 <span class="section-count">(${myRaces.length})</span></h2>
      ${myRaces.length===0
        ?`<div class="empty-state" style="padding:24px;"><p>暂无主办的赛事</p><button class="primary" onclick="openWorkspace('create')" style="margin-top:12px;">➕ 创建首场赛事</button></div>`
        :`<div class="console-card-grid">${myRaces.map(r => `<div class="console-card" onclick="openWorkspace('${r.id}')">
        <h3>${r.title}</h3><p>${r.challenge_brief||''}</p>
        <div class="card-meta"><span class="status-tag ${r.status}">${statusLabel(r.status)}</span><span>🏇 ${r.registration_count||0} 人报名</span></div>
        <div class="card-actions"><button class="primary" onclick="event.stopPropagation();openWorkspace('${r.id}')">进入工作台</button></div>
      </div>`).join('')}</div>`}
    </div>`;
  }

  if (isRider) {
    const myRegs = App.registrations.filter(reg => reg.user_id===u.id);
    const myRaces = App.races.filter(r => myRegs.some(reg => reg.race_id===r.id));
    html += `<div class="console-section"><h2>🏇 我的参赛 <span class="section-count">(${myRaces.length})</span></h2>
      ${myRaces.length===0?'<div class="empty-state" style="padding:24px;">尚未报名任何赛事<br><button class="primary" onclick="navigateToPublicRegister()">去报名</button></div>'
      :`<div class="console-card-grid">${myRaces.map(r => { const reg=myRegs.find(x=>x.race_id===r.id); return `<div class="console-card" onclick="openWorkspace('${r.id}')">
        <h3>${r.title}</h3><p>${r.challenge_brief||''}</p>
        <div class="card-meta"><span class="status-tag ${r.status}">${statusLabel(r.status)}</span><span class="status-tag ${reg.status}">报名: ${statusLabel(reg.status)}</span></div>
        <div class="card-actions"><button class="primary" onclick="event.stopPropagation();openWorkspace('${r.id}')">查看参赛</button></div>
      </div>`;}).join('')}</div>`}
    </div>`;
  }

  if (isJudge) {
    const myAssignments = App.judgeAssignments.filter(ja => ja.judge_user_id === u.id);
    const myJudgeRaces = App.races.filter(r => myAssignments.some(ja => ja.race_id === r.id));
    html += `<div class="console-section"><h2>⚖️ 我评审的赛事 <span class="section-count">(${myJudgeRaces.length})</span></h2>
      ${myJudgeRaces.length===0?'<div class="empty-state" style="padding:24px;">暂无分配给我的评审赛事</div>'
      :`<div class="console-card-grid">${myJudgeRaces.map(r => `<div class="console-card" onclick="openWorkspace('${r.id}')">
        <h3>${r.title}</h3><p>${r.challenge_brief||''}</p>
        <div class="card-meta"><span class="status-tag ${r.status}">${statusLabel(r.status)}</span></div>
        <div class="card-actions"><button class="primary" onclick="event.stopPropagation();openWorkspace('${r.id}')">进入评审工作台</button></div>
      </div>`).join('')}</div>`}
    </div>`;
  }

  if (!isOrg&&!isRider&&!isJudge) html += `<div class="empty-state">你的账号尚未分配角色，请联系管理员。<br><button onclick="window.location.href='/admin'">前往 Admin Console</button></div>`;
  container.innerHTML = html||'<div class="empty-state">暂无可用赛事</div>';
}

function navigateToPublicRegister() { window.location.href = '/'; }

// ====== Workspace ======
async function openWorkspace(raceId) {
  const race = App.races.find(r=>r.id===raceId);
  if (!race) return;
  App.currentRace = race;
  navigate('workspace');

  const u = App.currentUser;
  const isOrg = u&&(u.roles.includes('organizer')||u.roles.includes('admin'))&&(race.organizer_user_ids||[]).includes(u.id);
  const isRider = u&&u.roles.includes('rider');
  const isJudge = u&&u.roles.includes('judge');

  // Fetch fresh data
  const regsRes = await fetch('/api/registrations');
  App.registrations = await safeJson(regsRes, []);
  const rpRes = await fetch('/api/race-projects');
  App.raceProjects = await safeJson(rpRes, []);
  const worksRes = await fetch('/api/works');
  App.works = await safeJson(worksRes, []);
  const jaRes = await fetch('/api/judge-assignments');
  App.judgeAssignments = await safeJson(jaRes, []);
  const jrRes = await fetch('/api/judging-records');
  App.judgingRecords = await safeJson(jrRes, []);

  document.getElementById('workspace-top').innerHTML = `
    <div class="breadcrumb"><a onclick="navigate('home')">Console Home</a> / ${race.title}</div>
    <div class="race-status-line"><h1>${race.title}</h1><span class="status-tag ${race.status}">${statusLabel(race.status)}</span></div>`;

  // Tabs
  const tabs = document.getElementById('workspace-tabs');
  if (isOrg) {
    tabs.innerHTML = `<button class="tab-item active" onclick="switchWorkspaceTab('overview')" data-ws-tab="overview">📊 概览</button>
      <button class="tab-item" onclick="switchWorkspaceTab('registrations')" data-ws-tab="registrations">📋 报名管理</button>
      <button class="tab-item" onclick="switchWorkspaceTab('judges')" data-ws-tab="judges">👥 评委管理</button>
      <button class="tab-item" onclick="switchWorkspaceTab('awards')" data-ws-tab="awards">🏆 奖项发布</button>
      <button class="tab-item" onclick="switchWorkspaceTab('create-race')" data-ws-tab="create-race">➕ 创建赛事</button>`;
    App.wsTab = 'overview';
    switchWorkspaceTab('overview');
  } else if (isRider) {
    const reg = App.registrations.find(r=>r.race_id===raceId&&r.user_id===u.id);
    tabs.innerHTML = `<button class="tab-item active" onclick="switchWorkspaceTab('rider-overview')" data-ws-tab="rider-overview">📊 概览</button>
      <button class="tab-item" onclick="switchWorkspaceTab('rider-ca')" data-ws-tab="rider-ca">📡 CA 接入</button>
      <button class="tab-item" onclick="switchWorkspaceTab('rider-work')" data-ws-tab="rider-work">📦 作品</button>`;
    App.wsTab = 'rider-overview';
    switchWorkspaceTab('rider-overview');
  } else if (isJudge) {
    tabs.innerHTML = `<button class="tab-item active" onclick="switchWorkspaceTab('judge-works')" data-ws-tab="judge-works">⚖️ 待评审</button>
      <button class="tab-item" onclick="switchWorkspaceTab('judge-done')" data-ws-tab="judge-done">✅ 已评审</button>`;
    App.wsTab = 'judge-works';
    switchWorkspaceTab('judge-works');
  } else {
    tabs.innerHTML = '';
    document.getElementById('workspace-content').innerHTML = '<div class="empty-state">你无权查看此赛事的工作台</div>';
  }
}

function switchWorkspaceTab(tab) {
  App.wsTab = tab;
  document.querySelectorAll('[data-ws-tab]').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-ws-tab="${tab}"]`)?.classList.add('active');
  renderWorkspaceTab();
}

function renderWorkspaceTab() {
  const race = App.currentRace;
  const u = App.currentUser;
  const isOrg = u&&(u.roles.includes('organizer')||u.roles.includes('admin'));
  const isRider = u&&u.roles.includes('rider');
  const isJudge = u&&u.roles.includes('judge');
  const container = document.getElementById('workspace-content');
  hideFeedback();

  if (isOrg) {
    if (App.wsTab === 'overview') container.innerHTML = renderOrgOverview(race);
    else if (App.wsTab === 'registrations') container.innerHTML = renderOrgRegistrations(race);
    else if (App.wsTab === 'judges') container.innerHTML = renderOrgJudges(race);
    else if (App.wsTab === 'awards') container.innerHTML = renderOrgAwards(race);
    else if (App.wsTab === 'create-race') container.innerHTML = renderCreateRaceForm();
  } else if (isRider) {
    const reg = App.registrations.find(r=>r.race_id===race.id&&r.user_id===u.id);
    if (App.wsTab === 'rider-overview') container.innerHTML = renderRiderOverview(race, reg);
    else if (App.wsTab === 'rider-ca') container.innerHTML = renderRiderCA(race, reg);
    else if (App.wsTab === 'rider-work') container.innerHTML = renderRiderWork(race, reg);
  } else if (isJudge) {
    if (App.wsTab === 'judge-works') container.innerHTML = renderJudgeWorks(race);
    else if (App.wsTab === 'judge-done') container.innerHTML = renderJudgeDone(race);
  }
}

// ===================== ORGANIZER VIEWS =====================

function renderOrgOverview(race) {
  const regs = App.registrations.filter(r=>r.race_id===race.id);
  const pending = regs.filter(r=>r.status==='submitted');
  const approved = regs.filter(r=>r.status==='approved');

  const statusOptions = ['draft','published','registration','running','submitting','judging','completed','archived'];
  const statusIdx = statusOptions.indexOf(race.status);

  return `<div class="workspace-panels">
    <div class="info-card"><h4>📋 赛事概览</h4>
      <div class="info-row"><span class="label">状态</span><span class="value"><span class="status-tag ${race.status}">${statusLabel(race.status)}</span></span></div>
      <div class="info-row"><span class="label">赛题</span><span class="value">${race.challenge_brief||'-'}</span></div>
      <div class="info-row"><span class="label">报名 / 已通过 / 待审</span><span class="value">${regs.length} / ${approved.length} / ${pending.length}</span></div>
      <div class="info-row" style="border-top:1px solid var(--line);padding-top:10px;margin-top:10px;">
        <span class="label">变更状态</span>
        <span class="value" style="display:flex; gap:8px;">
          <select id="race-status-select">
            ${statusOptions.map((s,i) => `<option value="${s}" ${i===statusIdx?'selected':''}>${statusLabel(s)}</option>`).join('')}
          </select>
          <button class="primary" style="padding:6px 12px;font-size:12px;" onclick="doUpdateRaceStatus('${race.id}')">更新</button>
        </span>
      </div>
    </div>
    <div class="info-card"><h4>⏰ 赛程</h4>
      ${race.time_windows?Object.entries(race.time_windows||{}).map(([k,v])=>{
        const labelMap = { registration_start:'报名开始', registration_end:'报名截止', race_start:'比赛开始', race_end:'比赛结束', submission_deadline:'提交截止' };
        return `<div class="info-row"><span class="label">${labelMap[k]||k}</span><span class="value">${fmtDate(v)}</span></div>`;
      }).join(''):'<div class="info-row"><span>未设置</span></div>'}
    </div>
    <div class="info-card"><h4>📤 作品提交</h4>
      <div class="info-row"><span class="label">已提交作品</span><span class="value">${App.works.filter(w=>w.race_id===race.id).length}</span></div>
    </div>
  </div>`;
}

async function doUpdateRaceStatus(raceId) {
  const sel = document.getElementById('race-status-select');
  if (!sel) return;
  const newStatus = sel.value;
  try {
    const res = await fetch(`/api/races/${raceId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:newStatus}) });
    if (res.ok) { showFeedback('ok',`✅ 状态已更新为「${statusLabel(newStatus)}」`); refreshData(); }
    else { const d=await res.json(); showFeedback('error',`❌ ${d.error||'更新失败'}`); }
  } catch(e) { showFeedback('error',`请求失败: ${e.message}`); }
}

function renderOrgRegistrations(race) {
  const regs = App.registrations.filter(r=>r.race_id===race.id);
  if (regs.length===0) return '<div class="empty-state"><div class="icon">📋</div><p>暂无报名数据</p></div>';
  return `<div class="workspace-panels">
    ${regs.map(reg => {
      const user = App.users.find(u=>u.id===reg.user_id);
      const rp = App.raceProjects.find(r=>r.registration_id===reg.id);
      return `<div class="info-card"><h4>${user?.display_name||'未知'} <span class="status-tag ${reg.status}" style="float:right;">${statusLabel(reg.status)}</span></h4>
        <div class="info-row"><span class="label">GitHub</span><span class="value">${user?.github_account_id||'-'}</span></div>
        <div class="info-row"><span class="label">报名时间</span><span class="value">${fmtDate(reg.submitted_at)}</span></div>
        ${rp?`<div class="info-row"><span class="label">RaceProject</span><span class="value">${rp.aggregate_ingestion_status} (${rp.connection_health})</span></div>`:''}
        ${reg.status==='submitted'?`<div class="action-bar" style="margin-top:10px;"><button class="primary" onclick="doApprove('${reg.id}')">✅ 通过</button><button class="danger" onclick="doReject('${reg.id}')">❌ 拒绝</button></div>`:''}
        ${reg.review_flags&&reg.review_flags.length?`<div class="review-flags">⚠ ${reg.review_flags.map(f=>f.flagType||f).join(', ')}</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

async function doApprove(regId) {
  try {
    const res = await fetch(`/api/registrations/${regId}/approve`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({approvedByUserId:App.currentUser?.id||'system'}) });
    const data = await res.json();

async function doImportGitHubRepo() {
  const repo = document.getElementById('cr-gh-repo')?.value.trim();
  if (!repo) { showFeedback('error','请输入仓库名称（格式: owner/repo）'); return; }
  try {
    showFeedback('ok', '⏳ 正在从 GitHub 获取仓库信息...');
    const res = await fetch(`https://api.github.com/repos/${repo}`);
    if (!res.ok) { showFeedback('error', `仓库不存在或无权访问: ${repo}`); return; }
    const data = await res.json();
    document.getElementById('cr-title').value = data.name || data.full_name;
    document.getElementById('cr-brief').value = data.description || '';
    document.getElementById('cr-slug').value = data.name?.toLowerCase().replace(/[^a-z0-9-]/g,'-') || repo.split('/')[1];
    showFeedback('ok', `✅ 已从 ${data.full_name} 导入！请确认信息后创建赛事`);
  } catch(e) { showFeedback('error', `导入失败: ${e.message}`); }
}

async function doCreateRace() {
  const title = document.getElementById('cr-title')?.value;
  const brief = document.getElementById('cr-brief')?.value;
  const slug = document.getElementById('cr-slug')?.value;
  const status = document.getElementById('cr-status')?.value;
  if (!title) { showFeedback('error','请输入赛事名称'); return; }
  try {
    const res = await fetch('/api/races', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title, challengeBrief:brief, slug, status, organizerUserIds:[App.currentUser?.id]}) });
    if (!res.ok) { const d=await res.json(); showFeedback('error',`创建失败: ${d.error||'未知错误'}`); return; }
    showFeedback('ok', `✅ 赛事「${title}」创建成功！`);
    await refreshData();
    // Select the new race
    const newRace = App.races.find(r=>r.slug===slug);
    if (newRace) openWorkspace(newRace.id);
  } catch(e) { showFeedback('error',`请求失败: ${e.message}`); }
}

async function doReject(regId) {
  const reason = prompt('请输入拒绝原因:');

async function doRegisterCA(raceProjectId) {
  const connectorId = document.getElementById('ca-connector-id')?.value;
  const caProjectId = document.getElementById('ca-project-id')?.value;
  const caType = document.getElementById('ca-type')?.value;
  if (!connectorId) { showFeedback('error','请输入 Connector ID'); return; }
  try {
    const res = await fetch('/api/ca-connections', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({raceProjectId, connectorId, caProjectId:caProjectId||undefined, caType}) });
    const data = await res.json();
    if (res.ok) { showFeedback('ok', `✅ CA 连接已登记 (${data.id?.slice(0,8)}...)`); refreshData(); }
    else showFeedback('error', `❌ ${data.error||'登记失败'}`);
  } catch(e) { showFeedback('error',`请求失败: ${e.message}`); }
}

function renderCAConnectionsHTML(ccs) {
  if (!ccs||ccs.length===0) return '<div style="color:var(--muted);font-size:13px;padding:12px 0;">暂无 CA 连接</div>';
  return `<div class="ca-grid">${ccs.map(c => `<div class="ca-card ${c.ingestion_status==='active'?'verified':c.ingestion_status==='failed'?'failed':''}">
    <b>${c.ca_type||'未知'} (${(c.connector_id||'?').slice(0,12)}...)</b>
    <span>状态: <span class="ca-status ${c.ingestion_status==='active'||c.ingestion_status==='connected'?'ok':'err'}">${c.ingestion_status}</span></span>
    <span>真实性: ${c.authenticity_status||'unknown'}</span>
    <span>登记: ${c.registered_at?new Date(c.registered_at).toLocaleString('zh-CN'):'-'}</span>
  </div>`).join('')}</div>`;
}

function renderRiderWork(race, reg) {
  if (!reg||reg.status!=='approved') return '<div class="empty-state">报名通过后才可以提交作品</div>';
  const work = App.works.find(w=>w.registration_id===reg.id);

  if (work) {
    if (App.editingRiderWork && work.status !== 'locked') {
      return `<div class="info-card"><h4>✏️ 编辑作品</h4>
        <div class="form-group"><label>作品标题</label><input id="wk-edit-title" value="${work.title || ''}" placeholder="作品标题" /></div>
        <div class="form-group"><label>摘要</label><textarea id="wk-edit-summary" placeholder="简要描述">${work.summary || ''}</textarea></div>
        <div class="form-group"><label>代码仓库 URL (可选)</label><input id="wk-edit-repo" value="${work.repo_url || ''}" placeholder="https://github.com/..." /></div>
        <div class="form-group"><label>描述 (可选)</label><textarea id="wk-edit-desc" placeholder="详细描述">${work.description || ''}</textarea></div>
        <div class="action-bar">
          <button class="primary" onclick="doUpdateWork('${work.id}')">保存更改</button>
          <button onclick="cancelEditWork()">取消</button>
        </div>
      </div>`;
    }

    return `<div class="info-card"><h4>📦 作品详情</h4>
      <div class="info-row"><span class="label">标题</span><span class="value">${work.title}</span></div>
      <div class="info-row"><span class="label">状态</span><span class="value"><span class="status-tag ${work.status}">${statusLabel(work.status)}</span></span></div>
      ${work.summary?`<div class="info-row"><span class="label">摘要</span><span class="value">${work.summary}</span></div>`:''}
      ${work.description?`<div class="info-row"><span class="label">描述</span><span class="value" style="white-space:pre-wrap;">${work.description}</span></div>`:''}
      ${work.repo_url?`<div class="info-row"><span class="label">代码</span><span class="value"><a href="${work.repo_url}" target="_blank">${work.repo_url}</a></span></div>`:''}
      ${work.status!=='locked'?`<div class="action-bar"><button class="primary" onclick="startEditWork()">✏️ 编辑作品</button></div>`:''}
    </div>`;
  }

  return `<div class="info-card"><h4>📤 提交作品</h4>
    <div class="form-group"><label>作品标题</label><input id="wk-title" placeholder="为你的作品起个名字" /></div>
    <div class="form-group"><label>摘要</label><textarea id="wk-summary" placeholder="简要描述你的作品"></textarea></div>
    <div class="form-group"><label>代码仓库 URL (可选)</label><input id="wk-repo" placeholder="https://github.com/..." /></div>
    <div class="form-group"><label>描述 (可选)</label><textarea id="wk-desc" placeholder="详细描述"></textarea></div>
    <div class="action-bar"><button class="primary" onclick="doCreateWork('${reg.id}')">创建并提交作品</button></div>
  </div>`;
}

function startEditWork() { App.editingRiderWork = true; renderWorkspaceTab(); }
function cancelEditWork() { App.editingRiderWork = false; renderWorkspaceTab(); }

async function doUpdateWork(workId) {
  const title = document.getElementById('wk-edit-title')?.value;
  const summary = document.getElementById('wk-edit-summary')?.value;
  const repoUrl = document.getElementById('wk-edit-repo')?.value;
  const desc = document.getElementById('wk-edit-desc')?.value;
  if (!title) { showFeedback('error','请输入作品标题'); return; }
  try {
    const res = await fetch(`/api/works/${workId}`, { 
      method: 'PUT', 
      headers: { 'Content-Type':'application/json' }, 
      body: JSON.stringify({ title, summary, description: desc, repoUrl: repoUrl || undefined }) 
    });
    const data = await res.json();
    if (res.ok) { 
      showFeedback('ok', `✅ 作品已更新！`); 
      App.editingRiderWork = false;
      await refreshData(); 
    } else { 
      showFeedback('error', `❌ ${data.error||'更新失败'}`); 
    }
  } catch(e) { showFeedback('error',`请求失败: ${e.message}`); }
}

async function doCreateWork(regId) {
  const title = document.getElementById('wk-title')?.value;
  const summary = document.getElementById('wk-summary')?.value;
  const repoUrl = document.getElementById('wk-repo')?.value;
  const desc = document.getElementById('wk-desc')?.value;
  if (!title) { showFeedback('error','请输入作品标题'); return; }
  try {
    const res = await fetch('/api/works', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({registrationId:regId, title, summary, description:desc, repoUrl:repoUrl||undefined}) });
    const data = await res.json();
    if (res.ok) { showFeedback('ok', `✅ 作品「${title}」已提交！`); refreshData(); switchWorkspaceTab('rider-overview'); }
    else showFeedback('error', `❌ ${data.error||'提交失败'}`);
  } catch(e) { showFeedback('error',`请求失败: ${e.message}`); }
}

async function doSubmitWork(workId) {
  try {
    showFeedback('ok', '✅ 作品已提交！等待评审。');
    await refreshData();
  } catch(e) { showFeedback('error',`操作失败: ${e.message}`); }
}

// ===================== COMMON =====================

async function refreshData() {
  const r1 = await fetch('/api/races'); App.races = await safeJson(r1, []);
  const r2 = await fetch('/api/registrations'); App.registrations = await safeJson(r2, []);
  const r3 = await fetch('/api/race-projects'); App.raceProjects = await safeJson(r3, []);
  const r4 = await fetch('/api/works'); App.works = await safeJson(r4, []);
  const r5 = await fetch('/api/ca-connections'); App.caConnections = await safeJson(r5, []);
  const r6 = await fetch('/api/judge-assignments'); App.judgeAssignments = await safeJson(r6, []);
  const r7 = await fetch('/api/judging-records'); App.judgingRecords = await safeJson(r7, []);
  try { const r8 = await fetch('/api/awards'); App.awards = await safeJson(r8, []); } catch(e) {}
  renderSidebar();
  if (App.currentRace) {
    const updated = App.races.find(r=>r.id===App.currentRace.id);
    if (updated) App.currentRace = updated;
  }
  if (App.currentView==='home') renderHome();
  else renderWorkspaceTab();
}

function showFeedback(type, msg) {
  const el = document.getElementById('workspace-feedback');
  if (!el) return;
  el.style.display = 'block';
  el.className = `feedback ${type}`;
  el.innerHTML = msg;
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}
function hideFeedback() {
  const el = document.getElementById('workspace-feedback');
  if (el) el.style.display = 'none';
}

function statusLabel(s) {
  const map = { draft:'草稿', published:'已发布', registration:'报名中', running:'进行中', submitting:'提交期', judging:'评审中', completed:'已结束', archived:'已归档', submitted:'已报名', approved:'已通过', rejected:'已拒绝', withdrawn:'已退赛', none:'未报名', not_configured:'未配置', connected:'已连接', active:'活跃', failed:'失败', no_signal:'无信号', ok:'正常', partial_failed:'部分失败', all_failed:'全部失败' };
  return map[s]||s;
}

// ====== Start ======
init();
</script>
</body>
