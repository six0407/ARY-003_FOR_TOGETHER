<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Hall — ARY</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800;900&display=swap');

    .lh-shell {
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      background: hsl(222, 47%, 11%);
      color: hsl(210, 40%, 96%);
      font-family: 'Inter', sans-serif;
    }
    .lh-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 32px;
      background: hsla(222, 47%, 15%, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom:1px solid hsla(222, 47%, 25%, 0.5);
      z-index: 100;
    }
    .lh-header .brand {
      display:flex;
      align-items:center;
      gap:12px;
      color: #fff;
      text-decoration:none;
      font-family: 'Outfit', sans-serif;
      font-weight:800;
      font-size:18px;
    }
    .lh-header .brand img { height:28px; }
    .lh-header .live-dot {
      display:inline-block;
      width:10px;
      height:10px;
      border-radius:50%;
      background:hsl(142, 75%, 45%);
      margin-right:6px;
      box-shadow: 0 0 10px hsl(142, 75%, 45%);
      animation:pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.2)} }
    .lh-header .nav-links a { color:hsl(215, 25%, 68%);text-decoration:none;font-size:13.5px;font-weight:700;margin-left:20px;transition:all 0.2s; }
    .lh-header .nav-links a:hover { color:#fff; }

    .lh-body { flex:1;display:flex;overflow:hidden; }
    .lh-main { flex:1;padding:32px 40px;overflow-y:auto; }
    .lh-sidebar {
      width:360px;
      background: hsla(222, 47%, 15%, 0.4);
      backdrop-filter: blur(10px);
      border-left:1px solid hsla(222, 47%, 25%, 0.4);
      display:flex;
      flex-direction:column;
    }

    .lh-title {
      font-family: 'Outfit', sans-serif;
      font-size:26px;
      font-weight:900;
      margin-bottom:6px;
      display:flex;
      align-items:center;
      gap:12px;
      color: #fff;
    }
    .lh-title small { font-size:13.5px;font-weight:700;color:hsl(215, 25%, 68%);background:hsla(215, 25%, 68%, 0.1);padding:3px 10px;border-radius:20px; }
    .lh-subtitle { font-size:14px;color:hsl(215, 25%, 68%);margin-bottom:32px;font-weight:500; }

    /* ====== Canvas Track ====== */
    .track-container {
      position: relative;
      width: 100%;
      height: 380px;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 32px;
      background: linear-gradient(180deg, hsla(222, 47%, 15%, 0.3), hsla(222, 47%, 8%, 0.8));
      border: 1px solid hsla(222, 47%, 25%, 0.3);
    }
    .track-container canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .track-container .time-gate {
      position: absolute;
      right: 32px;
      top: 24px;
      min-width: 80px;
      padding: 6px 16px;
      border: 2px solid hsla(224, 90%, 56%, 0.4);
      border-radius: 10px;
      color: #fff;
      background: linear-gradient(135deg, hsl(224, 90%, 56%), hsl(190, 95%, 45%));
      box-shadow: 0 10px 26px hsla(224, 90%, 56%, 0.22);
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 950;
      z-index: 5;
    }
    .track-container .signal-badge {
      position: absolute;
      left: 24px;
      top: 24px;
      padding: 8px 16px;
      border-radius: 10px;
      background: hsla(0, 0%, 100%, 0.1);
      border: 1px solid hsla(222, 47%, 25%, 0.4);
      backdrop-filter: blur(8px);
      z-index: 5;
    }
    .track-container .signal-badge span { display:block;font-size:10px;font-weight:800;color:hsl(215,25%,68%);text-transform:uppercase;letter-spacing:0.5px; }
    .track-container .signal-badge b { font-family:'Outfit',sans-serif;font-size:24px;font-weight:950;color:#fff;font-style:italic; }

    .rider-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px; }
    
    .rider-card {
      background: hsla(222, 47%, 15%, 0.5);
      border: 1px solid hsla(222, 47%, 25%, 0.5);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .rider-card:hover {
      border-color: hsl(224, 90%, 56%);
      background: hsla(222, 47%, 18%, 0.7);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px hsla(224, 90%, 56%, 0.15);
    }
    .rider-card .top { display:flex;justify-content:space-between;align-items:center;margin-bottom:12px; }
    .rider-card .name { font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:#fff; }
    .rider-card .rank-badge {
      background: hsl(224, 90%, 56%);
      color:#fff;
      padding:3px 12px;
      border-radius:20px;
      font-size:11.5px;
      font-weight:800;
      font-family:'Outfit',sans-serif;
    }
    .rider-card .status-row { display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap; }
    
    .rider-card .status-tag { padding:3px 10px;border-radius:6px;font-size:10.5px;font-weight:800;text-transform:uppercase; }
    .rider-card .status-tag.active { background:hsl(142, 70%, 93%);color:hsl(142, 75%, 25%); }
    .rider-card .status-tag.connected { background:hsl(217, 90%, 93%);color:hsl(217, 85%, 28%); }
    .rider-card .status-tag.failed { background:hsl(0, 93%, 94%);color:hsl(0, 80%, 30%); }
    .rider-card .status-tag.risk { background:hsl(38, 92%, 92%);color:hsl(38, 90%, 25%); border: 1px solid hsl(38, 80%, 75%); }
    
    .rider-card .metrics { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
    .rider-card .metric { background: hsla(222, 47%, 9%, 0.7); border-radius:10px; padding:10px; text-align:center; border: 1px solid hsla(222, 47%, 20%, 0.4); }
    .rider-card .metric .val { font-family:'Outfit',sans-serif; font-size:20px; font-weight:800; color:#fff; }
    .rider-card .metric .lbl { font-size:10px; color:hsl(215, 25%, 68%); font-weight:700; text-transform:uppercase; margin-top:2px; letter-spacing:0.5px; }
    .rider-card .progress-bar { margin-top:14px; height:6px; background:hsla(222, 47%, 20%, 0.8); border-radius:3px; overflow:hidden; }
    .rider-card .progress-bar .fill { height:100%; background:linear-gradient(90deg, hsl(224, 90%, 56%), hsl(190, 95%, 45%)); border-radius:3px; transition:width 0.5s; }

    .event-stream { flex:1;overflow-y:auto;padding:24px 20px; }
    .event-stream h3 {
      font-family: 'Outfit', sans-serif;
      font-size:13.5px;
      font-weight:800;
      color:hsl(215, 25%, 68%);
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:18px;
    }
    .event-item { padding:12px 0;border-bottom:1px solid hsla(222, 47%, 25%, 0.3);font-size:12.5px; }
    .event-item .time { color:hsl(215, 25%, 52%);font-weight:700;margin-right:6px; }
    .event-item .rider { color:hsl(224, 90%, 65%);font-weight:700;margin-right:6px; }
    .event-item .type { color:hsl(190, 95%, 45%);font-weight:700;margin-right:6px; }
    .event-item .desc { color:hsl(210, 40%, 85%);margin-top:4px;line-height:1.5; }

    .empty-state { text-align:center;padding:60px 20px;color:hsl(215, 25%, 68%);font-size:15px;line-height:1.6; }
    .empty-state h2 { font-family:'Outfit',sans-serif; color:#fff; }
    .empty-state select { margin-top:14px; }
    .empty-state button {
      margin-top:12px;
      min-height:36px;
      padding:0 20px;
      border:1px solid hsla(222, 47%, 25%, 0.6);
      border-radius:10px;
      background:hsla(222, 47%, 15%, 0.7);
      color:hsl(224, 90%, 65%);
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      transition:all 0.2s;
    }
    .empty-state button:hover {
      background: hsla(224, 90%, 56%, 0.1);
      border-color: hsla(224, 90%, 56%, 0.3);
    }

    @media (max-width:1024px) { .lh-sidebar { display:none; } }
  </style>
</head>
<body>
<div class="lh-shell">
  <header class="lh-header">
    <a class="brand" href="/console">
      <img src="./assets/logo-horse-compass-transparent.png" alt="" />
      <span>ARY <span class="live-dot"></span> Live Hall</span>
    </a>
    <div class="nav-links">
      <a href="/console">← Console</a>
      <a href="/">Public</a>
    </div>
  </header>

  <div class="lh-body">
    <div class="lh-main" id="lh-main">
      <div class="empty-state">加载中...</div>
    </div>
    <div class="lh-sidebar">
      <div class="event-stream" id="event-stream">
        <h3>📡 骑行事件流</h3>
        <div style="color:#94a3b8;font-size:13px;">等待数据...</div>
      </div>
    </div>
  </div>
</div>

<script src="/auth.js"></script>
<script>
  let pollTimer = null;
  const raceId = new URLSearchParams(location.search).get('raceId');

  async function loadLiveHall() {
    if (!raceId) {
      await showRaceSelector("请选择要查看实况的赛事");
      return;
    }
    try {
      const data = await safeFetch(`/api/live-hall/${raceId}`);
      if (!data) throw new Error('赛事不存在或加载失败');
      renderLiveHall(data);
    } catch(e) {
      await showRaceSelector(`加载失败: ${e.message}`);
    }
  }

  async function showRaceSelector(reason) {
    try {
      const races = await safeFetch('/api/races');
      const runningOrActive = races.filter(r => r.status === 'running' || r.status === 'registration' || r.status === 'judging' || r.status === 'completed');
      
      const optionsHtml = runningOrActive.map(r => `<option value="${r.id}">${r.title} (${statusLabel(r.status)})</option>`).join('');
      
      document.getElementById('lh-main').innerHTML = `
        <div class="empty-state">
          <h2 style="font-size:20px;font-weight:800;color:#f1f5f9;margin-bottom:8px;">📡 实况直播大厅</h2>
          <p style="color:#94a3b8;font-size:14px;margin-bottom:16px;">${reason}</p>
          ${runningOrActive.length === 0 
            ? '<p style="color:#64748b;font-size:13px;">目前暂无进行中的赛事</p>'
            : `<div style="display:inline-flex;gap:8px;max-width:320px;width:100%;margin-bottom:16px;align-items:center;justify-content:center;">
                <select id="race-select" style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:8px 12px;color:#f1f5f9;font-weight:bold;outline:none;">
                  ${optionsHtml}
                </select>
                <button onclick="goToSelectedRace()" style="padding:8px 16px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-weight:bold;cursor:pointer;min-height:36px;">进入</button>
               </div>`
          }
          <br>
          <a href="/console" style="color:#3b82f6;text-decoration:none;font-weight:bold;font-size:13px;display:inline-block;margin-top:8px;">← 返回控制台</a>
        </div>
      `;
    } catch (e) {
      document.getElementById('lh-main').innerHTML = `<div class="empty-state">无法获取赛事列表<br><small>${e.message}</small></div>`;
    }
  }

  function goToSelectedRace() {
    const val = document.getElementById('race-select')?.value;
    if (val) {
      window.location.href = `/live-hall?raceId=${val}`;
    }
  }

  function renderLiveHall(data) {
    const { race, projections, recentEvents } = data;
    const riderColors = ["#075bec", "#13a7ff", "#ffb12b", "#ff4b72"];

    // Main content
    document.getElementById('lh-main').innerHTML = `
      <div class="lh-title">🏁 ${race.title} <small>${race.status === 'running' ? '🔴 直播中' : statusLabel(race.status)}</small></div>
      <div class="lh-subtitle">👥 ${projections.length} 位骑手 · 📡 ${recentEvents.length} 条最新事件</div>

      <div class="track-container" id="track-container">
        <div class="signal-badge"><span>RIDING SIGNAL</span><b id="signalValue">${Math.round(Math.random() * 30 + 60)}%</b></div>
        <div class="time-gate" id="timeGate">00:00:00</div>
        <canvas id="liveCanvas"></canvas>
      </div>

      ${projections.length === 0
        ? '<div class="empty-state">暂无骑手数据<br><small>等待 CA 信号接入...</small></div>'
        : `<div class="rider-grid">${projections.map((p,i) => {
          const m = p.metrics || {};
          const risks = p.risks || [];
          const conn = p.connection || {};
          const color = riderColors[i % riderColors.length];
          return `<div class="rider-card">
            <div class="top">
              <span class="name" style="display:flex;align-items:center;gap:10px;">
                <span style="display:grid;place-items:center;width:36px;height:36px;border-radius:50%;color:#fff;background:${color};font-size:14px;font-weight:950;">${(p.rider_name||'?')[0]}</span>
                ${p.rider_name || '骑手 ' + (i+1)}
              </span>
              <span class="rank-badge">#${p.leaderboard_rank || i+1}</span>
            </div>
            <div class="status-row">
              <span class="status-tag ${conn.ingestion_status === 'active' ? 'active' : conn.ingestion_status === 'connected' ? 'connected' : 'failed'}">${conn.ingestion_status || 'unknown'}</span>
              ${risks.map(r => `<span class="status-tag risk">⚠ ${r}</span>`).join('')}
            </div>
            <div class="progress-bar"><div class="fill" style="width:${m.progressPercent||0}%"></div></div>
            <div class="metrics" style="margin-top:8px;">
              <div class="metric"><div class="val">${m.progressPercent||0}%</div><div class="lbl">进度</div></div>
              <div class="metric"><div class="val">${Math.round((m.tokensUsed||0)/1000)}k</div><div class="lbl">Token</div></div>
              <div class="metric"><div class="val">${m.sessionsCount||0}</div><div class="lbl">Sessions</div></div>
              <div class="metric"><div class="val">${m.phase||'idle'}</div><div class="lbl">状态</div></div>
            </div>
            ${p.latest_event_summary ? `<div style="margin-top:8px;font-size:11px;color:#94a3b8;">📌 ${p.latest_event_summary.slice(0,80)}</div>` : ''}
          </div>`;
        }).join('')}</div>`
      }
    `;

    // Initialize canvas animation with rider data from projections
    initCanvas(projections, riderColors);

    // Event stream
    const eventList = document.getElementById('event-stream');
    if (eventList) {
      eventList.innerHTML = `<h3>📡 骑行事件流</h3>
        ${recentEvents.length === 0
          ? '<div style="color:#94a3b8;font-size:13px;">暂无事件</div>'
          : recentEvents.map(e => `
            <div class="event-item">
              <span class="time">${e.time}</span>
              <span class="rider">${e.rider_name}</span>
              <span class="type">${e.signal_type}</span>
              <div class="desc">${(e.content||'').slice(0,100)}</div>
            </div>
          `).join('')}
      `;
    }
  }

  // ====== Canvas Track Animation ======
  let canvasRiders = [];
  let canvasAnimId = null;
  const canvasColors = ["#075bec", "#13a7ff", "#ffb12b", "#ff4b72"];

  function initCanvas(projections, colors) {
    const canvas = document.getElementById('liveCanvas');
    if (!canvas) return;
    if (canvasAnimId) { cancelAnimationFrame(canvasAnimId); canvasAnimId = null; }

    // Build rider data for animation
    canvasRiders = projections.map((p, i) => ({
      name: (p.rider_name || 'Rider ' + (i+1)).split(' ')[0],
      color: canvasColors[i % canvasColors.length],
      lane: 0.18 + (i % 4) * 0.2,
      speed: 0.0001 - (i % 4) * 0.000008,
      phase: 0.08 + (i % 4) * 0.22,
      progress: Math.min((p.metrics?.progressPercent || 0) / 100, 0.95),
    }));

    // Resize
    function resize() {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * scale));
      canvas.height = Math.max(1, Math.floor(rect.height * scale));
      canvas.getContext('2d').setTransform(scale, 0, 0, scale, 0, 0);
    }
    window.removeEventListener('resize', resize);
    window.addEventListener('resize', resize);
    resize();

    // Animation loop
    let startTime = performance.now();
    function drawFrame(time) {
      const rect = canvas.getBoundingClientRect();
      if (rect.width < 1 || rect.height < 1) { canvasAnimId = requestAnimationFrame(drawFrame); return; }
      const ctx = canvas.getContext('2d');
      const elapsed = time - startTime;
      const w = rect.width, h = rect.height;

      // Background
      const bg = ctx.createLinearGradient(0, 0, w, h);
      bg.addColorStop(0, '#06164a'); bg.addColorStop(0.55, '#08215f'); bg.addColorStop(1, '#02091e');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);

      // Speed lines
      ctx.save(); ctx.globalAlpha = 0.42;
      for (let i = 0; i < 34; i++) {
        const y = h * (0.12 + i * 0.026);
        const startX = -w * 0.12 + i * 17;
        const endX = w * (0.92 + (i % 6) * 0.02);
        const grad = ctx.createLinearGradient(startX, y, endX, y - 60);
        grad.addColorStop(0, 'rgba(22,140,255,0)');
        grad.addColorStop(0.45, 'rgba(48,216,255,0.42)');
        grad.addColorStop(1, 'rgba(22,140,255,0)');
        ctx.strokeStyle = grad; ctx.lineWidth = i % 5 === 0 ? 5 : 2;
        ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y - h * 0.22); ctx.stroke();
      }
      ctx.restore();

      // Horizon curves
      ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 2;
      const horizon = h * 0.7;
      for (let i = 0; i < 10; i++) {
        ctx.beginPath(); ctx.moveTo(w * 0.04, horizon + i * 18);
        ctx.quadraticCurveTo(w * 0.52, horizon - 110 + i * 6, w * 0.96, horizon + i * 22);
        ctx.stroke();
      }

      // Track curve
      ctx.strokeStyle = 'rgba(48,216,255,0.72)'; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.moveTo(w * 0.08, h * 0.82);
      ctx.bezierCurveTo(w * 0.24, h * 0.22, w * 0.48, h * 0.86, w * 0.68, h * 0.42);
      ctx.bezierCurveTo(w * 0.78, h * 0.22, w * 0.88, h * 0.44, w * 0.95, h * 0.26);
      ctx.stroke();

      // Riders on track
      canvasRiders.forEach((rider, idx) => {
        const progress = (rider.progress + elapsed * rider.speed * 0.5) % 1;
        const px = w * (0.06 + progress * 0.88);
        const py = h * (0.55 + Math.sin(progress * Math.PI * 2.8 + rider.lane * 3.6) * 0.16 + Math.cos(progress * Math.PI * 1.35) * 0.08 + (rider.lane - 0.5) * 0.18);
        const tailX = w * (0.06 + Math.max(0, progress - 0.09) * 0.88);
        const tailY = h * (0.55 + Math.sin(Math.max(0, progress - 0.09) * Math.PI * 2.8 + rider.lane * 3.6) * 0.16 + Math.cos(Math.max(0, progress - 0.09) * Math.PI * 1.35) * 0.08 + (rider.lane - 0.5) * 0.18);

        // Trail
        const trail = ctx.createLinearGradient(tailX, tailY, px, py);
        trail.addColorStop(0, 'rgba(255,255,255,0)'); trail.addColorStop(1, rider.color);
        ctx.strokeStyle = trail; ctx.lineWidth = 8;
        ctx.beginPath(); ctx.moveTo(tailX, tailY); ctx.lineTo(px, py); ctx.stroke();

        // Marker
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.beginPath(); ctx.arc(px, py, 14, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = rider.color; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(px, py, 14, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#ffffff'; ctx.font = '950 18px Arial, sans-serif';
        ctx.fillText(rider.name, px + 22, py - 5);
      });

      // Update time gate
      const totalSec = Math.floor(elapsed / 1000);
      const m = String(Math.floor(totalSec / 60)).padStart(2, '0');
      const s = String(totalSec % 60).padStart(2, '0');
      const ms = String(Math.floor((elapsed % 1000) / 10)).padStart(2, '0');
      const tg = document.getElementById('timeGate');
      if (tg) tg.textContent = `${m}:${s}:${ms}`;

      // Update signal value
      const signal = Math.round(75 + Math.sin(elapsed / 560) * 4);
      const sv = document.getElementById('signalValue');
      if (sv) sv.textContent = signal + '%';

      canvasAnimId = requestAnimationFrame(drawFrame);
    }
    canvasAnimId = requestAnimationFrame(drawFrame);
  }

  function statusLabel(s) {
    const map = { draft:'草稿', published:'已发布', registration:'报名中', running:'进行中', submitting:'提交期', judging:'评审中', completed:'已结束' };
    return map[s]||s;
  }

  // Auto-refresh every 10 seconds
  loadLiveHall();
  if (raceId) { pollTimer = setInterval(loadLiveHall, 10000); }
</script>
</body>
</html>
