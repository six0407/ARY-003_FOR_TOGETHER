<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Work — ARY</title><link rel="stylesheet" href="/app.css"/></head>
<body>
<header class="ary-header">
  <a class="brand" href="/home.html"><img src="/assets/logo-horse-compass-transparent.png" alt=""/><span>Agent Racing Yard</span></a>
  <nav><a href="/home.html">Races</a><a href="/works.html">Works</a><a href="/results.html">Results</a><a href="/cooperation.html">Cooperation</a></nav>
  <div class="user-area"><a href="/console" class="btn btn-outline btn-sm">Console →</a></div>
</header>
<div class="page-container" id="app"><div class="empty-state">加载中...</div></div>
<footer class="ary-footer">Agent Racing Yard · MVP v0.2</footer>
<script>
  const workId = new URLSearchParams(location.search).get('id');

  function esc(s) { return String(s || "").replace(/[<>&"]/g, c => ({ "<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;" })[c]); }

  function parseMarkdown(text) {
    if (!text) return "";
    let html = esc(text);
    
    // Replace headings
    html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
    
    // Bold & Italic
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
    
    // Lists: convert bullet items
    html = html.replace(/^[\-*]\s+(.*?)$/gm, '<li>$1</li>');
    // Group consecutive list items into ul
    html = html.replace(/((?:<li>.*?<\/li>\s*)+)/g, '<ul>$1</ul>');

    // Split blocks and wrap non-html blocks in p
    const blocks = html.split(/\n\n+/);
    html = blocks.map(block => {
      block = block.trim();
      if (!block) return "";
      if (block.startsWith('<h') || block.startsWith('<ul') || block.startsWith('<li')) {
        return block;
      }
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    }).join('');

    return html;
  }

  async function load(){
    if(!workId){ document.getElementById('app').innerHTML='<div class="empty-state">请指定作品 ID</div>'; return; }
    try {
      const [worksRes, racesRes, usersRes] = await Promise.all([
        fetch('/api/works'), fetch('/api/races'), fetch('/api/auth/users'),
      ]);
      const works = await worksRes.json(); const races = await racesRes.json(); const users = await usersRes.json();
      const work = works.find(w=>w.id===workId);
      if(!work){ document.getElementById('app').innerHTML='<div class="empty-state">作品未找到</div>'; return; }

      const race = races.find(r=>r.id===work.race_id);
      const author = users.find(u=>u.id===work.owner_user_id);

      document.getElementById('app').innerHTML=
        `<div style="max-width:800px; margin: 0 auto;"><div style="margin-bottom:20px;"><a href="/works.html" style="color:var(--muted);font-size:14px;font-weight:700;text-decoration:none;transition:var(--transition);" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--muted)'">← 返回作品广场</a></div>
        <div class="glass-card"><div class="card-header" style="padding: 24px 32px; border-bottom: 1px solid var(--line); display:flex; justify-content:space-between; align-items:center;">
          <h1 style="font-family:'Outfit',sans-serif;font-size:24px;margin:0;color:var(--ink);font-weight:800;">${esc(work.title)}</h1>
          <span class="badge ${work.status==='submitted'?'badge-live':'badge-draft'}">${{submitted:'已提交',draft:'草稿',locked:'已锁定'}[work.status]||work.status}</span>
        </div><div class="card-body" style="padding: 32px;">
          ${work.summary?`<p style="font-size:16px;color:var(--muted);line-height:1.6;margin-bottom:24px;font-weight:500;">${esc(work.summary)}</p>`:''}
          ${work.description?`<div style="background:rgba(0,0,0,0.02);border-radius:12px;padding:24px;margin-bottom:24px;font-size:14.5px;line-height:1.6;border:1px solid var(--line);" class="markdown-body">${parseMarkdown(work.description)}</div>`:''}
          <div style="display:flex;gap:20px;font-size:14px;color:var(--muted);flex-wrap:wrap;border-top:1px solid var(--line);padding-top:20px;font-weight:600;">
            <span>👤 作者: <a href="/rider.html?slug=${author?.slug||''}" style="color:var(--primary);font-weight:700;text-decoration:none;">${esc(author?.display_name||'未知')}</a></span>
            ${race?`<span>🏁 赛事: <a href="/race.html?slug=${race.slug}" style="color:var(--primary);font-weight:700;text-decoration:none;">${esc(race.title)}</a></span>`:''}
            ${work.submitted_at?`<span>📅 提交: ${new Date(work.submitted_at).toLocaleString('zh-CN')}</span>`:''}
          </div>
          <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;">
            ${work.repo_url?`<a href="${esc(work.repo_url)}" target="_blank" class="btn btn-outline btn-sm" style="font-weight:700;">📂 查看代码</a>`:''}
            ${work.demo_url?`<a href="${esc(work.demo_url)}" target="_blank" class="btn btn-outline btn-sm" style="font-weight:700;">🚀 查看 Demo</a>`:''}
          </div>
        </div></div></div>`;
    } catch(e){ document.getElementById('app').innerHTML=`<div class="empty-state">加载失败: ${e.message}</div>`; }
  }
  load();
</script>
</body>
</html>
