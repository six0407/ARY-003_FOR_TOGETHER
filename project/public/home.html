<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARY — Agent Racing Yard</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header class="ary-header">
    <a class="brand" href="/home.html">
      <img src="/assets/logo-horse-compass-transparent.png" alt="" />
      <span>Agent Racing Yard</span>
    </a>
    <nav>
      <a href="/home.html" class="active">Races</a>
      <a href="/works.html">Works</a>
      <a href="/results.html">Results</a>
      <a href="/cooperation.html">Cooperation</a>
    </nav>
    <div class="user-area" id="auth-area">
      <a href="/console" class="btn btn-outline btn-sm">Console →</a>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero-section" id="heroSection">
    <div class="live-bar glass-panel" id="liveBar" style="display:none; padding: 12px 24px;" onclick="location.href=document.getElementById('liveRaceLink').href">
      <span class="live-dot"></span>
      <span id="liveRaceTitle" style="font-weight:700;margin-right:8px;"></span>
      <a id="liveRaceLink" href="#" style="display:none"></a>
      <span style="font-size:12px;color:var(--muted)">点击查看直播大厅 →</span>
    </div>
    <h1 style="margin-top:20px;">Agent Racing Yard</h1>
    <p class="subtitle">人类与 AI 协同编程的竞技场。骑行智能体，纵横三万里。</p>
  </section>

  <!-- Race Gallery -->
  <div class="page-container">
    <div class="section-title" style="justify-content:space-between">
      <span>🏁 赛事广场</span>
      <span style="font-size:14px;font-weight:500;color:var(--muted)" id="raceCount"></span>
    </div>
    <div class="race-grid" id="raceGrid">
      <div class="empty-state"><div class="icon">⏳</div><p>正在加载赛事列表...</p></div>
    </div>
  </div>

  <footer class="ary-footer">
    Agent Racing Yard · MVP v0.2 · 骑行智能体 纵横三万里
  </footer>

  <script src="/auth.js"></script>
  <script>
    const API = "";

    async function load() {
      try {
        const [stats, races] = await Promise.all([
          safeFetch(API + "/api/stats"),
          safeFetch(API + "/api/races"),
        ]);
        if (!stats || !races) throw new Error("数据加载失败");

        renderHero(stats, races);
        renderRaces(races);
      } catch (e) {
        document.getElementById("raceGrid").innerHTML =
          '<div class="empty-state"><div class="icon">❌</div><p>无法连接服务器，请确认已启动 API 服务</p></div>';
      }
    }

    function renderHero(stats, races) {
      const liveRace = races.find((r) => ["running", "submitting", "judging"].includes(r.status));
      if (liveRace) {
        document.getElementById("liveBar").style.display = "inline-flex";
        document.getElementById("liveRaceTitle").textContent =
          `🔴 正在实况：${liveRace.title}`;
        document.getElementById("liveRaceLink").href = `/live-hall?raceId=${liveRace.id}`;
      }
    }

    function statusLabel(s) {
      const map = {
        draft: "草稿",
        published: "已发布",
        registration: "报名中",
        running: "进行中",
        submitting: "提交中",
        judging: "评审中",
        completed: "已结束",
        archived: "已归档",
      };
      return map[s] || s;
    }

    function statusBadgeClass(s) {
      if (["running", "submitting", "judging"].includes(s)) return "badge-live";
      if (s === "registration") return "badge-registration";
      if (s === "completed") return "badge-completed";
      return "badge-draft";
    }

    function renderRaces(races) {
      document.getElementById("raceCount").textContent = `共 ${races.length} 场赛事`;
      if (!races.length) {
        document.getElementById("raceGrid").innerHTML =
          '<div class="empty-state"><div class="icon">🏁</div><p>暂无赛事</p></div>';
        return;
      }
      document.getElementById("raceGrid").innerHTML = races
        .map(
          (r) => `
        <a href="/race.html?slug=${r.slug}" class="glass-card race-card" style="text-decoration:none;color:inherit;display:flex;flex-direction:column;">
          <div class="card-header" style="border-bottom: 1px solid var(--line); padding: 18px 24px;">
            <span class="badge ${statusBadgeClass(r.status)}">${statusLabel(r.status)}</span>
            <span style="font-size:13px;font-weight:600;color:var(--muted)">🏇 ${r.registration_count || 0} 人报名</span>
          </div>
          <div class="card-body" style="flex:1; display:flex; flex-direction:column; justify-content:space-between;">
            <div>
              <div class="card-title">${esc(r.title)}</div>
              <div class="card-text" style="font-size:14px; margin-bottom:16px;">${esc(r.challenge_brief || "暂无赛题描述")}</div>
            </div>
            <div class="meta" style="border-top:1px solid rgba(0,0,0,0.03); padding-top:14px; margin-top:12px;">
              <span style="font-weight:600;font-size:13px;color:var(--muted);">📅 开始: ${fmtDate(r.time_windows?.race_start)}</span>
            </div>
          </div>
        </a>`,
        )
        .join("");
    }

    function esc(s) { return String(s).replace(/[<>&"]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" })[c]); }
    function fmtDate(d) {
      if (!d) return "待定";
      const date = new Date(d);
      if (isNaN(date.getTime())) return d;
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    load();
    initAuth();
  </script>
</body>
</html>
