name: Test

on:
  push:
    branches: [master, 'feat/**', 'fix/**']
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: project/package-lock.json

      - run: npm ci

      - run: npm test
        env:
          DB_PATH: db/test-gh.sqlite
          LOG_LEVEL: error
